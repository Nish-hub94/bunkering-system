name: Bunkering Management System CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches:  [main]


jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: action/checkout@v4

      - name: Setup Python
        uses: action/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
            pip install -r requirements.txt

      - name: Run Lint Check
        run:
          flake8 . --exclude=.venv --max-line-length=120

      - name: Run Tests
        run:
          pytest

      - name: Run Main
        run: python main.py

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: outputs/

