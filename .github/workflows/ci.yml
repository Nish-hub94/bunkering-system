name: Bunkering Management System CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches:  [main]


jobs:
  test:

    runs-on: ubuntu-latest



    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install Dependencies
        run: |
            pip install -r requirements.txt
            pip install flake8 pytest


      - name: Run Tests
        env:
          CI: "true"
        run:
          export PYTHONPATH=$PYTHONPATH:.
          pytest

      - name: Run Main
        run: python main.py

      - name: Upload Outputs
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: outputs/

